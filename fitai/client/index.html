<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fbfbfd" />
    <title>FitAI — Your AI Fitness Coach</title>
    <script>
      // Apply the saved (or OS-preferred) theme BEFORE first paint — a
      // dark-mode user must never see a white flash.
      (function () {
        try {
          var t = localStorage.getItem('fitai.theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.dataset.theme = t;
          if (t === 'dark') {
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute('content', '#0a0b0d');
          }
        } catch (e) { /* default light */ }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- One family for voice, one for measurement. Geist carries both the
         display and UI roles (the difference is setting, not face), and
         Geist Mono handles labels and figures. Fraunces was dropped with
         the editorial identity — it was a five-axis variable font on the
         critical path serving headings alone. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400..600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
