<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fff4ec" />
    <title>FitAI — Your AI Fitness Coach</title>
    <script>
      // Apply the saved (or OS-preferred) theme BEFORE first paint — a
      // dark-mode user must never see a white flash.
      (function () {
        try {
          var t = localStorage.getItem('fitai.theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.dataset.theme = t;
          if (t === 'dark') {
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute('content', '#1a0716');
          }
        } catch (e) { /* default light */ }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fraunces (display only, opsz+SOFT+WONK axes — run at low SOFT and
         WONK 0; the axes are requested so the scale can set them per size)
         · Geist (UI/body) · Geist Mono (labels, measurements). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,0..100,0..1;1,9..144,300..700,0..100,0..1&family=Geist:wght@300..700&family=Geist+Mono:wght@400..600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
